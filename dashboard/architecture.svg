<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#565049"/></marker>
    <marker id="arrC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#2f6db0"/></marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#cc5a36"/></marker>
  </defs>

  <!-- warm-white canvas -->
  <rect width="1400" height="860" fill="#faf9f7"/>

  <!-- brand header -->
  <text x="70" y="52" font-size="20" font-weight="bold" letter-spacing="-1" fill="#1c1b18">NEXUS</text>
  <text x="158" y="52" font-size="18" fill="#565049">Sentinel Mesh</text>
  <text x="1330" y="40" font-size="12" font-family="Menlo, monospace" fill="#117a4d" text-anchor="end">● LIVE · verified-memory control plane</text>
  <text x="1330" y="58" font-size="11" font-family="Menlo, monospace" fill="#8f897e" text-anchor="end">architecture</text>
  <line x1="70" y1="70" x2="1330" y2="70" stroke="#e8e4dc" stroke-width="1.5"/>
  <text x="70" y="94" font-size="13" fill="#565049">The referee guards memory · memory grounds the referee · the fleet compounds truth every run</text>

  <!-- ── fleet column ── -->
  <text x="70" y="132" font-size="11" font-family="Menlo, monospace" letter-spacing="1.5" fill="#8f897e" font-weight="bold">I · THE FLEET</text>
  <rect x="70" y="146" width="280" height="74" rx="14" fill="#ffffff" stroke="#e8e4dc" stroke-width="1.3"/>
  <text x="92" y="176" font-size="14" fill="#1c1b18" font-weight="bold">Worker A · researcher</text>
  <text x="92" y="198" font-size="11" font-family="Menlo, monospace" fill="#8f897e">ADK LlmAgent · A2A :8001 · AgentCard</text>

  <rect x="70" y="238" width="280" height="74" rx="14" fill="#ffffff" stroke="#e8e4dc" stroke-width="1.3"/>
  <text x="92" y="268" font-size="14" fill="#1c1b18" font-weight="bold">Worker B · planner</text>
  <text x="92" y="290" font-size="11" font-family="Menlo, monospace" fill="#8f897e">ADK LlmAgent · A2A :8002 · AgentCard</text>

  <rect x="70" y="350" width="280" height="86" rx="14" fill="#ffffff" stroke="#e8e4dc" stroke-width="1.3"/>
  <text x="92" y="380" font-size="14" fill="#1c1b18" font-weight="bold">Orchestrator</text>
  <text x="92" y="402" font-size="11" font-family="Menlo, monospace" fill="#8f897e">ADK Agent · RemoteA2aAgent tools</text>
  <text x="92" y="420" font-size="11" font-family="Menlo, monospace" fill="#8f897e">delegates over real A2A (JSONRPC)</text>

  <path d="M210 220 V238" fill="none" stroke="#d6d0c4" stroke-width="1.6" marker-end="url(#arr)"/>
  <path d="M210 312 V350" fill="none" stroke="#d6d0c4" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="222" y="338" font-size="10.5" font-family="Menlo, monospace" fill="#8f897e">A2A protocol</text>

  <!-- claim flows right -->
  <path d="M350 393 H470" fill="none" stroke="#d6d0c4" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arr)"/>
  <text x="360" y="383" font-size="11" fill="#565049">every claim, in the message path</text>

  <!-- ── control plane (HERO, clay outline) ── -->
  <text x="470" y="132" font-size="11" font-family="Menlo, monospace" letter-spacing="1.5" fill="#9e4527" font-weight="bold">II · SENTINEL CONTROL PLANE</text>
  <rect x="470" y="146" width="420" height="424" rx="16" fill="#ffffff" stroke="#cc5a36" stroke-width="2.4"/>

  <text x="496" y="186" font-size="15" fill="#1c1b18" font-weight="bold">intercept()</text>
  <text x="496" y="206" font-size="11" font-family="Menlo, monospace" fill="#8f897e">ADK before_tool_callback · non-experimental seam</text>
  <text x="496" y="224" font-size="11" font-family="Menlo, monospace" fill="#8f897e">memory-first fast path: verified claim → 0 model calls</text>
  <line x1="496" y1="240" x2="864" y2="240" stroke="#e8e4dc" stroke-width="1"/>

  <text x="496" y="268" font-size="13.5" fill="#1c1b18" font-weight="bold">3-lens Gemini referee</text>
  <text x="496" y="288" font-size="11" font-family="Menlo, monospace" fill="#8f897e">robust · overreach · nevers — parallel, hostile</text>
  <text x="496" y="306" font-size="11" font-family="Menlo, monospace" fill="#8f897e">gemini-flash on Vertex AI · JSON verdicts · temp 0</text>
  <text x="496" y="332" font-size="13.5" fill="#c43d2e" font-weight="bold">+ deterministic tripwire</text>
  <text x="496" y="352" font-size="11" font-family="Menlo, monospace" fill="#8f897e">money / auth / destructive → blocked, no model in the loop</text>
  <line x1="496" y1="370" x2="864" y2="370" stroke="#e8e4dc" stroke-width="1"/>

  <!-- verdict pills (clean, not rotated) -->
  <text x="496" y="398" font-size="11" font-family="Menlo, monospace" letter-spacing="1.5" fill="#8f897e" font-weight="bold">VERDICT</text>
  <rect x="496" y="408" width="92" height="24" rx="12" fill="#fcebe8" stroke="#f2c7bf" stroke-width="1"/>
  <text x="542" y="424" font-size="11" font-family="Menlo, monospace" font-weight="bold" fill="#c43d2e" text-anchor="middle">✕ Blocked</text>
  <text x="600" y="424" font-size="10.5" font-family="Menlo, monospace" fill="#8f897e">any lens ≤ 2 or tripwire — claim dropped, tool never fires</text>

  <rect x="496" y="446" width="92" height="24" rx="12" fill="#fbece4" stroke="#f0cdba" stroke-width="1"/>
  <text x="542" y="462" font-size="11" font-family="Menlo, monospace" font-weight="bold" fill="#9e4527" text-anchor="middle">⚠ Flagged</text>
  <text x="600" y="462" font-size="10.5" font-family="Menlo, monospace" fill="#8f897e">min = 3 — advisory contradiction is suspicion, never certainty</text>

  <rect x="496" y="484" width="98" height="24" rx="12" fill="#e6f4ec" stroke="#bfe3cd" stroke-width="1"/>
  <text x="545" y="500" font-size="11" font-family="Menlo, monospace" font-weight="bold" fill="#117a4d" text-anchor="middle">✓ Verified</text>
  <text x="606" y="500" font-size="10.5" font-family="Menlo, monospace" fill="#8f897e">all ≥ 4 — written back as verified, with provenance</text>

  <text x="496" y="540" font-size="11" fill="#565049">independently examined: 30-claim eval set · ADK eval + deterministic harness · see eval/</text>

  <!-- ── memory column ── -->
  <text x="1010" y="132" font-size="11" font-family="Menlo, monospace" letter-spacing="1.5" fill="#2f6db0" font-weight="bold">III · MEMORY — TWO LAYERS, SEPARATE FILES</text>
  <rect x="1010" y="146" width="320" height="170" rx="14" fill="#ffffff" stroke="#2f6db0" stroke-width="1.4"/>
  <text x="1032" y="176" font-size="13.5" fill="#2f6db0" font-weight="bold">advisory memory (read-only)</text>
  <text x="1032" y="198" font-size="11" font-family="Menlo, monospace" fill="#8f897e">SQLite `memories` contract · mode=ro</text>
  <text x="1032" y="216" font-size="11" font-family="Menlo, monospace" fill="#8f897e">prod: operator's kaia broker</text>
  <text x="1032" y="234" font-size="11" font-family="Menlo, monospace" fill="#8f897e">demo: seeded fictional store</text>
  <text x="1032" y="252" font-size="11" font-family="Menlo, monospace" fill="#8f897e">snippet retrieval centered on the</text>
  <text x="1032" y="270" font-size="11" font-family="Menlo, monospace" fill="#8f897e">densest term cluster</text>
  <text x="1032" y="296" font-size="10.5" font-family="Menlo, monospace" fill="#2f6db0">contradiction scores exactly 3 → Flagged</text>

  <rect x="1010" y="346" width="320" height="170" rx="14" fill="#ffffff" stroke="#2f6db0" stroke-width="1.4"/>
  <text x="1032" y="378" font-size="13.5" fill="#2f6db0" font-weight="bold">verified ledger (write-back)</text>
  <text x="1032" y="400" font-size="11" font-family="Menlo, monospace" fill="#8f897e">sentinel.db · its own file — broker</text>
  <text x="1032" y="418" font-size="11" font-family="Menlo, monospace" fill="#8f897e">refresh jobs can never clobber rulings</text>
  <text x="1032" y="436" font-size="11" font-family="Menlo, monospace" fill="#8f897e">claim_hash · confidence · dissent</text>
  <text x="1032" y="454" font-size="11" font-family="Menlo, monospace" fill="#8f897e">evidence_ref · ruling chain (trace-to-origin)</text>
  <text x="1032" y="480" font-size="10.5" font-family="Menlo, monospace" fill="#c43d2e">contradiction scores 1–2 → Blocked</text>
  <text x="1032" y="498" font-size="10.5" font-family="Menlo, monospace" fill="#2f6db0">verified claims served at 0 model calls</text>

  <!-- connectors plane <-> memory -->
  <path d="M890 250 H1010" fill="none" stroke="#2f6db0" stroke-width="1.5" stroke-dasharray="2 4" marker-start="url(#arrC)"/>
  <text x="906" y="240" font-size="10.5" font-family="Menlo, monospace" fill="#2f6db0">ground truth</text>
  <path d="M890 430 H1010" fill="none" stroke="#2f6db0" stroke-width="1.8" marker-end="url(#arrC)"/>
  <text x="906" y="420" font-size="10.5" font-family="Menlo, monospace" fill="#2f6db0">accept → write-back</text>

  <!-- closed loop return -->
  <path d="M1170 516 V600 H210 V436" fill="none" stroke="#d6d0c4" stroke-width="1.6" stroke-dasharray="7 5" marker-end="url(#arr)"/>
  <text x="700" y="588" font-size="12.5" fill="#565049" text-anchor="middle">run N+1 reads strictly cleaner memory — verified claims served at 0 model calls; a run-1 Flagged becomes a run-2 Blocked</text>

  <!-- footer: measured -->
  <line x1="70" y1="676" x2="1330" y2="676" stroke="#e8e4dc" stroke-width="1.5"/>
  <text x="70" y="702" font-size="11" font-family="Menlo, monospace" letter-spacing="1.5" fill="#8f897e" font-weight="bold">MEASURED, NOT ASSERTED — RECORDED RUN + INDEPENDENT EXAMINATION</text>
  <text x="70" y="728" font-size="12" font-family="Menlo, monospace" fill="#565049">Gemini lens calls 9 → 3 · memory-served claim: 0 calls / 0.5 ms (vs 3 calls / 3.7 s) · the lie: Flagged(0.6) → Blocked(0.2) · money claim blocked pre-model · verified claims 0 → 2</text>
  <text x="70" y="752" font-size="12" font-family="Menlo, monospace" fill="#565049" id="evalline">referee eval: 30 claims × 3 runs — accuracy, consistency and block precision/recall published in eval/results.json · run offline: SENTINEL_REPLAY=1 python eval/run_eval.py</text>

  <line x1="70" y1="788" x2="1330" y2="788" stroke="#e8e4dc" stroke-width="1"/>
  <text x="70" y="812" font-size="11" font-family="Menlo, monospace" fill="#8f897e">google ADK · A2A protocol · gemini on Vertex AI · provenance memory</text>
  <text x="1330" y="812" font-size="11" font-family="Menlo, monospace" fill="#8f897e" text-anchor="end">NEXUS AI LABS · sentinel.k.nexus</text>
</svg>
